<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamified Command Center Portfolio</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div id="boot-overlay">
        <div id="boot-text"></div>
    </div>

    <div id="app-container">
        <nav id="main-dock">
            <button id="nav-home" data-target="home" title="Home" aria-label="Home">
                <img src="src/Icons/home_icon.svg" alt="Home">
            </button>
            <button id="nav-works" data-target="works" title="Works" aria-label="Works">
                <img src="src/Icons/works_icon.svg" alt="Works">
            </button>
            <button id="nav-skills" data-target="skills" title="Skills" aria-label="Skills">
                <img src="src/Icons/github_icon.png" alt="Skills">
            </button>
            <button id="nav-contact" data-target="contact" title="Contact" aria-label="Contact">
                <img src="src/Icons/contact_icon.svg" alt="Contact">
            </button>
            <button id="theme-toggle" title="Toggle Theme" aria-label="Toggle Theme">
                <span class="theme-icon"></span>
            </button>
        </nav>

        <main id="viewport">
            <section id="home" class="module active">
                <h1>Welcome to the Command Center</h1>
            </section>
            <section id="works" class="module">
                <h2>Works</h2>
            </section>
            <section id="skills" class="module">
                <h2>Skills</h2>
            </section>
            <section id="contact" class="module">
                <h2>Contact</h2>
            </section>
        </main>
    </div>

    <script src="src/main.js" defer></script>
</body>
</html>
